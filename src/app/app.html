<div style="padding: 20px; max-width: 600px; margin: auto; font-family: sans-serif;">
  <h2>Angular AI Chat</h2>
  
  <!-- Message Display Area -->
  <div style="border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 15px; margin-bottom: 10px; background: #fff; display: flex; flex-direction: column;">
    @for (msg of chatService.messages(); track $index) {
      <div [style.text-align]="msg.role === 'user' ? 'right' : 'left'">
        <p [style.background]="msg.role === 'user' ? '#007bff' : '#f1f1f1'"
           [style.color]="msg.role === 'user' ? 'white' : 'black'"
           style="display: inline-block; padding: 10px; border-radius: 12px; margin: 5px; max-width: 80%;">
          {{ msg.content }}
        </p>
      </div>
    }
    
    @if (chatService.isLoading()) {
      <p style="color: #888;"><em>AI is thinking...</em></p>
    }
  </div>

  <!-- Input and Button Area -->
  <div style="display: flex; gap: 10px;">
    <input #userInput type="text" placeholder="Ask a question..." 
           style="flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none;"
           (keyup.enter)="chatService.sendMessage(userInput.value); userInput.value=''">
    
    <button (click)="chatService.sendMessage(userInput.value); userInput.value=''"
            style="padding: 10px 20px; background: #10a37f; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
      Send
    </button>
  </div>
</div>
